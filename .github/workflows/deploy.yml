name: Build & Deploy Ra7ti

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/ra7ti

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build & push Docker images
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/frontend.Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.API_DOMAIN }}/api/v1
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Trigger Coolify redeploy via webhook (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy via Coolify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Coolify webhook
        run: |
          curl -fsSL \
            -X GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
        # Set COOLIFY_WEBHOOK_URL in GitHub Secrets.
        # Get it from: Coolify → your app → Deployments → Deploy Webhook
