# Ra7ti – Nginx reverse proxy (local development / standalone VPS without Coolify)
# Production on Coolify: Traefik handles routing – nginx is optional.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ─────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ──────────────────────────────────────────────────────────
  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  gzip              on;
  gzip_types        text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
  gzip_min_length   1000;

  # ── Security headers ─────────────────────────────────────────────────────
  add_header X-Content-Type-Options  nosniff;
  add_header X-Frame-Options         SAMEORIGIN;
  add_header X-XSS-Protection        "1; mode=block";
  add_header Referrer-Policy         strict-origin-when-cross-origin;
  server_tokens off;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream backend  { server backend:3000;  }
  upstream frontend { server frontend:3001; }

  # ── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Main server block ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;                  # catches any domain in local dev

    client_max_body_size 10M;

    # ── Health check (used by Coolify / load balancers) ──────────────────
    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── API  →  NestJS backend ───────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Timeouts
      proxy_read_timeout    90s;
      proxy_connect_timeout 10s;
    }

    # ── Auth routes – stricter rate limit ────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static Next.js assets (long cache) ──────────────────────────────
    location /_next/static/ {
      proxy_pass       http://frontend;
      proxy_set_header Host $host;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── All other routes → Next.js frontend ──────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
